<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="atividades.css">
    <title>Document</title>
</head>
<body>

    <h1 id="titulo">Atividade 1 - Muda cor do título</h1>

    <button id="blueBotao">Deixar o título azul</button>

    <button id="redBotao">Deixar o título Vermelho</button>

<hr>

    <h1>Atividade 2 - Mostrar e esconder mensagem</h1>

    <button id="botao">Clique para esconder/mostrar o texto</button>
    <p id="texto">Texto brabo 2.0 reload pro max ultra hd</p>

<hr>

    <h1>Atividade 3 - Contador de caracteres </h1>

    <textarea id="caixaTexto" placeholder="Digite algo:"></textarea>
    <p id="caracteres"></p>

<hr>

    <h1>Atividade 4 - Contador de cliques</h1>

    <button id="clicker">Clique aqui</button>
    <p id="clicks"></p>

<hr>

    <h1>Atividade 5 e 6 - Crie e remova elementos dinamicamente</h1>

    <input type="text" id="item" placeholder="Digite um item">
    <button id="adicionar">Adicionar</button><br><br>

    <label>Lista:</label>
    <ul id="lista">

    </ul>

<hr>

    <h1>Desafio Hard</h1>

    <input type="text" id="user" placeholder="Digite seu nome">
    <button id="submit">Enviar</button>
    <p id="sucesso"></p>

<hr>

    <h1>Exercício - Validação de Campos</h1>

    <input type="email" id="email" placeholder="Digite seu Email:"><br>
    <p id="msg"></p>

    <input type="password" id="senha" placeholder="Digite sua senha"><br>
    <p id="quantidade"></p><br>

    <button id="validar">Validar</button>
    <p id="reportar"></p>

<script src="atividades.js"></script>
</body>
</html>
